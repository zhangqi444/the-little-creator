# Freshness Check (Semantic) — Phase 4 ceiling.
#
# The harder half of freshness checking: for every URL the wiki cites,
# fetches the live page and uses Claude to assess whether the page still
# supports the claims the wiki makes about it.
#
# Manual-only by default — semantic checks cost API tokens (~$0.30-1.00
# per full run). To enable a periodic schedule later, uncomment the
# `schedule:` block below.
#
# Required secret: ANTHROPIC_API_KEY (set in repo Settings → Secrets and
# variables → Actions). The workflow will fail fast with a clear message
# if the secret isn't configured.

name: Freshness Check (Semantic)

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Cap URLs to check (0 = all). Use a small number to test cheaply.'
        required: false
        default: '0'
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-haiku-4-5'
  # Uncomment to enable a quarterly schedule. Comment back out if costs surprise.
  # schedule:
  #   - cron: '0 10 1 */3 *'   # 1st of every 3rd month at 10:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  freshness-semantic:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret is set
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not configured. Set it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run semantic freshness
        id: check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          node scripts/freshness-semantic.mjs \
            --output freshness-semantic-report.md \
            --model "${{ inputs.model }}" \
            --max-pages "${{ inputs.max_pages }}" \
            --quiet
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Semantic freshness exit code: $code"
          if [ -f freshness-semantic-report.md ]; then
            echo "----- BEGIN REPORT -----"
            cat freshness-semantic-report.md
            echo "----- END REPORT -----"
          fi

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freshness-semantic-report
          path: freshness-semantic-report.md
          if-no-files-found: ignore
          retention-days: 90

      - name: Open issue if drift found
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              body = fs.readFileSync('freshness-semantic-report.md', 'utf8');
            } catch (e) {
              body = `Semantic freshness check exited non-zero (${process.env.EXIT_CODE}) but no report file was found. Check the run log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            }
            const today = new Date().toISOString().slice(0, 10);
            const intro = [
              `_Auto-generated by [Freshness Check (Semantic) workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) on ${today}._`,
              '',
              'Each finding is Claude\'s read on whether the live page still supports the wiki\'s claims about it. Verdicts span consistent → minor drift → significant drift → unrecognizable. Triage each non-consistent finding manually before editing the wiki.',
              '',
              '---',
              '',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Semantic freshness ${today} — drift detected`,
              body: intro + body,
              labels: ['freshness', 'semantic', 'maintenance', 'auto-generated'],
            });
        env:
          EXIT_CODE: ${{ steps.check.outputs.exit_code }}
