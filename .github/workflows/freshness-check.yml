# Freshness Check — Phase 4 of ARCHITECTURE.md §5.
#
# Runs scripts/freshness-check.mjs on a monthly cron (and on-demand). The
# script does mechanical link-health checks across every external URL the
# wiki cites: HTTP status, redirect chains, last-modified ages, network
# errors. If anything is actionable, this workflow opens a single summary
# issue with the report attached.
#
# Read-only on the wiki content. Writes only by opening issues — never PRs.
# That keeps autonomous output behind a human review gate, per BRD §8 and
# ARCHITECTURE.md §5 ("autonomous agents only ever open issues, never PRs").

name: Freshness Check

on:
  schedule:
    # 1st of every month at 08:00 UTC. Adjust here when the cadence
    # outpaces or trails the wiki's actual rate of change.
    - cron: '0 8 1 * *'
  workflow_dispatch:
    # Manual trigger from the Actions tab — useful right after a content
    # sweep, or when you want a fresh report without waiting for the cron.

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run freshness check
        id: check
        run: |
          set +e
          node scripts/freshness-check.mjs \
            --output freshness-report.md \
            --quiet
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Freshness exit code: $code"
          # Always show the report in the run log, regardless of pass/fail.
          if [ -f freshness-report.md ]; then
            echo "----- BEGIN REPORT -----"
            cat freshness-report.md
            echo "----- END REPORT -----"
          fi

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freshness-report
          path: freshness-report.md
          if-no-files-found: ignore
          retention-days: 90

      - name: Open issue if actionable findings
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              body = fs.readFileSync('freshness-report.md', 'utf8');
            } catch (e) {
              body = `Freshness check exited non-zero (${process.env.EXIT_CODE}) but no report file was found. Check the run log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            }
            const today = new Date().toISOString().slice(0, 10);
            const intro = [
              `_Auto-generated by [Freshness Check workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) on ${today}._`,
              '',
              'Mechanical link-health audit only — no semantic comparison. Triage and either fix the citation, replace the source, or close this issue if the findings are spurious.',
              '',
              '---',
              '',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Freshness check ${today} — actionable findings`,
              body: intro + body,
              labels: ['freshness', 'maintenance', 'auto-generated'],
            });
        env:
          EXIT_CODE: ${{ steps.check.outputs.exit_code }}
