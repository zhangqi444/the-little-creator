# Discover Sources — Phase 3 of ARCHITECTURE.md §5.
#
# Runs scripts/discover-sources.mjs on a weekly cron (and on-demand). Reads
# discovery-sources.json, fetches catalogued feeds, surfaces recent items,
# and lists watchlist pages for manual review. Opens a single GitHub issue
# per run summarizing the findings.
#
# Mechanical v1 — no LLM classification yet. Web-search queries are
# deferred to v2 (needs Anthropic web_search or a search API integration).
#
# Per ARCHITECTURE.md §5: autonomous agents only ever open issues, never
# PRs. This workflow has issues:write but NOT contents:write.

name: Discover Sources

on:
  schedule:
    # Weekly: every Monday 09:00 UTC. Discovery is more time-sensitive
    # than freshness, hence weekly vs monthly.
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run discovery
        id: discover
        run: |
          set +e
          node scripts/discover-sources.mjs \
            --output discovery-report.md \
            --recent-days 30 \
            --quiet
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Discovery exit code: $code"
          if [ -f discovery-report.md ]; then
            echo "----- BEGIN REPORT -----"
            cat discovery-report.md
            echo "----- END REPORT -----"
          fi

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovery-report
          path: discovery-report.md
          if-no-files-found: ignore
          retention-days: 90

      - name: Open issue if findings
        if: steps.discover.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              body = fs.readFileSync('discovery-report.md', 'utf8');
            } catch (e) {
              body = `Discovery exited non-zero (${process.env.EXIT_CODE}) but no report file was found. Check the run log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            }
            const today = new Date().toISOString().slice(0, 10);
            const intro = [
              `_Auto-generated by [Discover Sources workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) on ${today}._`,
              '',
              'Mechanical v1 — feeds + watchlist pages only, no LLM classification yet. For each candidate: ingest into the wiki, dismiss as off-topic, or update `discovery-sources.json` to refine future runs.',
              '',
              '---',
              '',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Discovery ${today} — candidate sources to triage`,
              body: intro + body,
              labels: ['discovery', 'maintenance', 'auto-generated'],
            });
        env:
          EXIT_CODE: ${{ steps.discover.outputs.exit_code }}
