name: PR checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` runs the prebuild hook (generate:llms) before
      # astro build, so this single step validates both the generator
      # script and the rendered Astro site.
      - name: Build site
        run: npm run build

      - name: Verify generated artifacts
        run: |
          test -s public/llms/llms.txt
          test -s public/llms/llms-full.txt
          test -s public/llms/llms-resources.txt
          test -s public/llms/llms-for-educators.txt
          test -s artifacts/llms-internal/llms-log.txt
          echo "Generated artifacts present and non-empty (public + internal)."

      # Copyright lint — fails the PR if any resource-map entry contains a
      # verbatim run of more than 50 consecutive words from its cited source.
      # This is the technical control that lets the project allow agents to
      # open draft PRs (per ARCHITECTURE.md §5 autonomy rule, updated 2026-05).
      - name: Copyright lint (>50-word verbatim check)
        run: |
          set +e
          npm run lint:copyright -- --output copyright-lint-report.md --quiet
          code=$?
          echo "Lint exit code: $code"
          if [ -f copyright-lint-report.md ]; then
            echo "----- BEGIN REPORT -----"
            cat copyright-lint-report.md
            echo "----- END REPORT -----"
          fi
          exit $code

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copyright-lint-report
          path: copyright-lint-report.md
          if-no-files-found: ignore
          retention-days: 30
